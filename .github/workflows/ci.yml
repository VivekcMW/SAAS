name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx nuxi typecheck

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Unit tests
        run: npm test
        env:
          DATABASE_PATH: ":memory:"
          NUXT_SESSION_SECRET: "ci-test-secret-32-chars-minimum-xx"
          SITE_URL: "http://localhost:3000"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NUXT_SESSION_SECRET: "ci-build-secret-32-chars-minimum-xx"
          SITE_URL: "https://saasworld.com"
          DATABASE_PATH: ":memory:"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for preview
        run: npm run build
        env:
          NUXT_SESSION_SECRET: "ci-e2e-secret-32-chars-minimum-xxx"
          SITE_URL: "http://localhost:3000"
          DATABASE_PATH: "./.data/ci.db"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NUXT_SESSION_SECRET: "ci-e2e-secret-32-chars-minimum-xxx"
          SITE_URL: "http://localhost:3000"
          DATABASE_PATH: "./.data/ci.db"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
