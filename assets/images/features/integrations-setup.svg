<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Header -->
  <rect width="600" height="60" fill="white"/>
  <text x="20" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Integration Setup</text>
  <rect x="480" y="15" width="100" height="30" rx="15" fill="#3b82f6"/>
  <text x="530" y="32" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">Add Integration</text>
  
  <!-- Main Content -->
  <rect x="40" y="80" width="520" height="280" fill="white" rx="12"/>
  
  <!-- Available Integrations Header -->
  <text x="60" y="110" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111827">Available Integrations</text>
  <text x="60" y="130" font-family="sans-serif" font-size="14" fill="#6b7280">Connect your favorite tools and services</text>
  
  <!-- Integration Cards Grid -->
  <!-- Slack -->
  <rect x="60" y="150" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="80" y="165" width="40" height="40" fill="#4a154b" rx="6"/>
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">S</text>
  <text x="135" y="175" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Slack</text>
  <text x="135" y="190" font-family="sans-serif" font-size="10" fill="#6b7280">Team Chat</text>
  <rect x="135" y="195" width="35" height="15" fill="#10b981" rx="7"/>
  <text x="152" y="204" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Connect</text>
  
  <!-- Google Drive -->
  <rect x="200" y="150" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="220" y="165" width="40" height="40" fill="#4285f4" rx="6"/>
  <text x="240" y="185" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">G</text>
  <text x="275" y="175" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Google Drive</text>
  <text x="275" y="190" font-family="sans-serif" font-size="10" fill="#6b7280">File Storage</text>
  <rect x="275" y="195" width="35" height="15" fill="#dbeafe" rx="7"/>
  <text x="292" y="204" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1e40af">Connected</text>
  
  <!-- Salesforce -->
  <rect x="340" y="150" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="360" y="165" width="40" height="40" fill="#00a1e0" rx="6"/>
  <text x="380" y="185" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">SF</text>
  <text x="415" y="175" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Salesforce</text>
  <text x="415" y="190" font-family="sans-serif" font-size="10" fill="#6b7280">CRM</text>
  <rect x="415" y="195" width="35" height="15" fill="#10b981" rx="7"/>
  <text x="432" y="204" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Connect</text>
  
  <!-- Zapier -->
  <rect x="60" y="250" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="80" y="265" width="40" height="40" fill="#ff4a00" rx="6"/>
  <text x="100" y="285" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">Z</text>
  <text x="135" y="275" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Zapier</text>
  <text x="135" y="290" font-family="sans-serif" font-size="10" fill="#6b7280">Automation</text>
  <rect x="135" y="295" width="35" height="15" fill="#10b981" rx="7"/>
  <text x="152" y="304" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Connect</text>
  
  <!-- Microsoft Teams -->
  <rect x="200" y="250" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="220" y="265" width="40" height="40" fill="#5c5c5c" rx="6"/>
  <text x="240" y="285" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">T</text>
  <text x="275" y="275" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Teams</text>
  <text x="275" y="290" font-family="sans-serif" font-size="10" fill="#6b7280">Collaboration</text>
  <rect x="275" y="295" width="35" height="15" fill="#dbeafe" rx="7"/>
  <text x="292" y="304" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1e40af">Connected</text>
  
  <!-- Dropbox -->
  <rect x="340" y="250" width="120" height="80" fill="#f8fafc" rx="8" stroke="#e5e7eb"/>
  <rect x="360" y="265" width="40" height="40" fill="#0061ff" rx="6"/>
  <text x="380" y="285" text-anchor="middle" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">D</text>
  <text x="415" y="275" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Dropbox</text>
  <text x="415" y="290" font-family="sans-serif" font-size="10" fill="#6b7280">File Sync</text>
  <rect x="415" y="295" width="35" height="15" fill="#10b981" rx="7"/>
  <text x="432" y="304" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Connect</text>
  
  <!-- Status Panel -->
  <rect x="480" y="150" width="60" height="180" fill="#f1f5f9" rx="8"/>
  <text x="510" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#374151">Status</text>
  
  <!-- Connected Count -->
  <circle cx="510" cy="190" r="15" fill="#10b981"/>
  <text x="510" y="196" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">2</text>
  <text x="510" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">Connected</text>
  
  <!-- Available Count -->
  <circle cx="510" cy="240" r="15" fill="#6b7280"/>
  <text x="510" y="246" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">4</text>
  <text x="510" y="260" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">Available</text>
  
  <!-- Setup Progress -->
  <text x="510" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">Setup</text>
  <text x="510" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">33%</text>
</svg>
