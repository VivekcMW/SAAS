<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Header Bar -->
  <rect width="600" height="60" fill="white"/>
  <rect x="20" y="20" width="80" height="20" rx="4" fill="#e2e8f0"/>
  <rect x="520" y="15" width="30" height="30" rx="15" fill="#3b82f6"/>
  
  <!-- Sidebar -->
  <rect x="0" y="60" width="200" height="340" fill="#f1f5f9"/>
  <rect x="20" y="80" width="160" height="12" rx="6" fill="#cbd5e1"/>
  <rect x="20" y="100" width="120" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="20" y="120" width="140" height="12" rx="6" fill="#e2e8f0"/>
  <rect x="20" y="140" width="100" height="12" rx="6" fill="#e2e8f0"/>
  
  <!-- Main Content Area -->
  <rect x="220" y="80" width="360" height="300" fill="white" rx="8"/>
  
  <!-- Charts -->
  <!-- Bar Chart -->
  <rect x="240" y="100" width="150" height="100" fill="#f8fafc" rx="4"/>
  <rect x="250" y="150" width="15" height="40" fill="#3b82f6"/>
  <rect x="270" y="140" width="15" height="50" fill="#10b981"/>
  <rect x="290" y="160" width="15" height="30" fill="#f59e0b"/>
  <rect x="310" y="130" width="15" height="60" fill="#8b5cf6"/>
  <rect x="330" y="145" width="15" height="45" fill="#ef4444"/>
  <rect x="350" y="155" width="15" height="35" fill="#06b6d4"/>
  
  <!-- Line Chart -->
  <rect x="410" y="100" width="150" height="100" fill="#f8fafc" rx="4"/>
  <polyline points="420,180 440,160 460,140 480,120 500,110 520,130 540,150" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <circle cx="420" cy="180" r="4" fill="#3b82f6"/>
  <circle cx="460" cy="140" r="4" fill="#3b82f6"/>
  <circle cx="500" cy="110" r="4" fill="#3b82f6"/>
  <circle cx="540" cy="150" r="4" fill="#3b82f6"/>
  
  <!-- Stats Cards -->
  <rect x="240" y="220" width="100" height="60" fill="#dbeafe" rx="6"/>
  <text x="290" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Revenue</text>
  <text x="290" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e40af">$24.5K</text>
  
  <rect x="360" y="220" width="100" height="60" fill="#d1fae5" rx="6"/>
  <text x="410" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#065f46">Users</text>
  <text x="410" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#065f46">1,234</text>
  
  <rect x="480" y="220" width="100" height="60" fill="#fef3c7" rx="6"/>
  <text x="530" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">Growth</text>
  <text x="530" y="260" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#92400e">+12.5%</text>
  
  <!-- Table -->
  <rect x="240" y="300" width="320" height="60" fill="#f8fafc" rx="4"/>
  <rect x="250" y="310" width="300" height="12" fill="#e2e8f0" rx="2"/>
  <rect x="250" y="330" width="280" height="8" fill="#f1f5f9" rx="2"/>
  <rect x="250" y="345" width="260" height="8" fill="#f1f5f9" rx="2"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Analytics Dashboard</text>
</svg>
